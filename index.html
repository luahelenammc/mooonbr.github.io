<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Portal da Moon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" type="text/css" href="/common.css">
  <style>
    :root{--azul:#245edb;--azul-claro:#0c8dea;--verde:#3d973d}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#000;overflow:hidden}body{cursor:default}.area-de-trabalho{position:relative;width:100vw;height:calc(100vh - 50px);min-height:520px;background:url("https://images2.alphacoders.com/941/941898.jpg") center/cover no-repeat;overflow:hidden}.desktop-icon{position:absolute;width:112px;min-height:128px;padding:10px 6px;text-align:center;color:#fff;text-shadow:2px 2px 8px #000;user-select:none;cursor:pointer}.desktop-icon img{display:block;max-width:72px;max-height:72px;margin:0 auto 5px;pointer-events:none}.desktop-icon span{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:13px}.desktop-icon:hover span{background:#004e98}.desktop-icon .clippy-label{position:absolute;right:-4px;top:-4px;width:62px;pointer-events:none}.barra-de-tarefas{position:fixed;left:0;bottom:0;width:100vw;height:50px;display:flex;align-items:stretch;background:linear-gradient(to bottom,var(--azul) 0%,var(--azul-claro) 9%,var(--azul) 18%,var(--azul) 92%,#333 100%);z-index:995}#iniciar{display:flex;align-items:center;justify-content:center;width:170px;margin:0 12px 0 0;padding:0 16px;border:0;border-top-right-radius:15px;border-bottom-right-radius:15px;color:#fff;font-size:1.4rem;font-weight:700;text-shadow:2px 2px 8px #003d00;background:linear-gradient(to bottom,var(--verde) 0%,#6faf72 9%,var(--verde) 18%,var(--verde) 92%,#666 100%);cursor:pointer}#iniciar:hover,#iniciar.active{background:linear-gradient(to bottom,var(--verde) 0%,#6faf72 9%,var(--verde) 18%,#37d437 92%,#666 100%)}#iniciar img{width:26px;height:26px;margin-right:8px}.programas-abertos{flex:1}.area-de-notificacao{display:flex;align-items:center;justify-content:space-between;width:230px;padding:0 8px;background:linear-gradient(to bottom,#0fadf4 0%,#0fadf4 9%,#108ae5 18%,#108ae5 92%,#666 100%)}.tray-icons{display:flex;gap:6px;align-items:center}.tray-icons img{width:20px;height:20px}#relogio{color:#fff;font-size:15px;font-weight:700}#menuIniciar{position:fixed;left:0;bottom:50px;width:min(500px,94vw);height:min(560px,78vh);display:none;flex-direction:column;background:#fff;border-top-right-radius:10px;border-right:3px solid var(--azul);box-shadow:0 0 18px rgba(0,0,0,.6);overflow:hidden;z-index:999}#menuIniciar.active{display:flex}.topoIniciar{display:flex;align-items:center;height:90px;background:linear-gradient(to bottom,var(--azul) 0%,var(--azul-claro) 9%,var(--azul) 18%,var(--azul) 100%)}.avatarIniciar{width:70px;height:70px;margin-left:16px;border-radius:10px;background:#fff url("/images/moonvrjan26.webp") center/cover no-repeat}.userName{margin-left:18px;color:#fff;font-size:20px}.mioloIniciar{display:flex;flex:1;padding:8px 0}.col{flex:1;display:flex;flex-direction:column;overflow:hidden}.tituloColuna{padding:4px 10px;font-size:12px;color:#555;font-weight:700;border-bottom:1px solid #ccc}.itemIniciar{display:flex;align-items:center;width:100%;padding:8px 12px;border-radius:6px;cursor:pointer}.itemIniciar:hover{background:linear-gradient(90deg,#316ac5 0%,#2853a3 100%)}.itemIniciar:hover span,.itemIniciar:hover strong{color:#fff}.itemIniciar img{width:28px;height:28px;margin-right:8px}.itemIniciar span{font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.itemIniciar strong{color:#000}.footerIniciar{display:flex;align-items:center;justify-content:flex-end;gap:16px;height:60px;padding-right:16px;color:#fff;font-size:13px;background:linear-gradient(to bottom,var(--azul) 0%,var(--azul-claro) 9%,var(--azul) 18%,var(--azul) 100%)}.footerIniciar img{width:18px;height:18px;margin-right:6px}#clippy-fun{position:absolute;right:40px;bottom:38px;z-index:2}#clippy-fun img{width:180px;height:auto}.moon-lang-overlay{position:fixed;inset:0;z-index:3000;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.72);backdrop-filter:blur(2px)}.moon-lang-overlay[hidden]{display:none!important}.moon-lang-modal{width:min(760px,94vw);max-height:min(92vh,760px);overflow-y:auto;padding:24px 24px 26px;text-align:center;color:#fff;background:#1f1f1f;border:2px solid rgba(255,255,255,.18);border-radius:16px;box-shadow:0 22px 70px rgba(0,0,0,.75)}.moon-lang-question{width:86px;max-width:28vw;height:auto;margin:0 auto 8px}.moon-lang-title{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:18px;font-weight:600;opacity:.78}.moon-lang-subtitle{max-width:560px;margin:10px auto 4px;color:rgba(255,255,255,.78);font-size:14px;line-height:1.45}.moon-lang-options{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-top:18px}.moon-lang-option{display:inline-flex;flex-direction:column;align-items:center;width:min(260px,76vw);min-height:305px;padding:14px 12px 16px;border:0;border-radius:10px;color:#fff;font:inherit;text-align:center;cursor:pointer;transition:background .35s,box-shadow .35s,transform .2s}.moon-lang-option:hover,.moon-lang-option:focus-visible{transform:translateY(-1px);outline:0}.moon-lang-option.usa{background:rgba(255,45,45,.3)}.moon-lang-option.brazil{background:rgba(47,179,57,.3)}.moon-lang-option.usa:hover,.moon-lang-option.usa:focus-visible{background:rgb(255,45,45);box-shadow:0 0 0 3px rgb(255,45,45)}.moon-lang-option.brazil:hover,.moon-lang-option.brazil:focus-visible{background:rgb(47,179,57);box-shadow:0 0 0 3px rgb(47,179,57)}.moon-lang-option img{width:100%;max-width:230px;height:auto;margin-bottom:6px;pointer-events:none}.moon-lang-option.brazil img{max-width:245px}.moon-lang-idioma{margin:4px 0;font-family:Georgia,"Times New Roman",serif;font-size:21px;font-weight:700;text-shadow:1px 1px 4px rgba(0,0,0,.6)}.moon-lang-descricao{font-family:Georgia,"Times New Roman",serif;font-size:13px;font-style:italic;line-height:1.35}.moon-lang-muted{opacity:.5}.moon-lang-close{margin-top:14px;padding:6px 12px;border:1px solid rgba(255,255,255,.35);border-radius:999px;color:rgba(255,255,255,.82);background:rgba(255,255,255,.08);cursor:pointer}.moon-lang-close:hover,.moon-lang-close:focus-visible{background:rgba(255,255,255,.16);outline:0}@media (max-width:900px),(pointer:coarse){.area-de-trabalho{height:calc(100vh - 56px);min-height:calc(100vh - 56px)}.barra-de-tarefas{height:56px}.desktop-icon{width:135px}.desktop-icon img{max-width:88px;max-height:88px}.desktop-icon span{font-size:17px}#clippy-fun{display:none}#menuIniciar{bottom:56px}.itemIniciar{min-height:58px}.itemIniciar img{width:42px;height:42px}.itemIniciar span{font-size:16px}#iniciar{width:190px;font-size:1.7rem}}@media (max-width:640px){.moon-lang-overlay{align-items:flex-start;padding:14px}.moon-lang-modal{padding:18px 14px 20px}.moon-lang-options{gap:14px}.moon-lang-option{min-height:0}}
  </style>
</head>
<body>
  <div id="moonLangOverlay" class="moon-lang-overlay" role="dialog" aria-modal="true" aria-labelledby="moonLangTitle" hidden>
    <div class="moon-lang-modal">
      <img class="moon-lang-question" src="/images/smbox.png" alt="" aria-hidden="true">
      <h2 id="moonLangTitle" class="moon-lang-title">Language <span class="moon-lang-muted">/</span> Idioma</h2>
      <p class="moon-lang-subtitle">This website is originally written in Brazilian Portuguese. You can keep the original version or open an automatic Google translation.</p>
      <div class="moon-lang-options">
        <button type="button" class="moon-lang-option usa" data-lang-action="translate"><img src="/images/usa.png" alt="English"><span class="moon-lang-idioma">English</span><span class="moon-lang-descricao">Translated by Google.<br><span class="moon-lang-muted">Might not be 100% accurate.</span></span></button>
        <button type="button" class="moon-lang-option brazil" data-lang-action="dismiss"><img src="/images/brazil.png" alt="Português Brasileiro"><span class="moon-lang-idioma">Português Brasileiro</span><span class="moon-lang-descricao">Idioma original</span></button>
      </div>
      <button type="button" class="moon-lang-close" data-lang-action="dismiss">Keep original / Manter original</button>
    </div>
  </div>
  <div class="area-de-trabalho" id="desktopArea"><div id="clippy-fun"></div></div>
  <div id="menuIniciar">
    <div class="topoIniciar"><div class="avatarIniciar"></div><div class="userName">Moon</div></div>
    <div class="mioloIniciar"><div class="col"><div class="tituloColuna">Redes sociais</div></div><div class="col"><div class="tituloColuna">Links</div></div></div>
    <div class="footerIniciar"><span><img src="https://icons.iconarchive.com/icons/dtafalonso/modern-xp/256/ModernXP-03-System-Lock-icon.png" alt="">Fazer Logoff</span><span><img src="https://icons.iconarchive.com/icons/alecive/flatwoken/128/Apps-Dialog-Shutdown-icon.png" alt="">Desligar</span></div>
  </div>
  <div class="barra-de-tarefas"><button id="iniciar"><img src="https://icons.iconarchive.com/icons/tatice/operating-systems/128/Windows-icon.png" alt="Windows">Iniciar</button><div class="programas-abertos"></div><div class="area-de-notificacao"><div class="tray-icons"><img src="https://img.ibxk.com.br/2014/3/programas/7868525214145846.png" alt="Volume"><img src="https://icons.iconarchive.com/icons/hopstarter/software/256/Windows-Media-Player-icon.png" alt="Media"><img src="https://1.bp.blogspot.com/_8H6ayPA2iRw/R4Sp5ZVhUnI/AAAAAAAAAJk/Sv91jzKzPZs/s320/cat_icon_security_256.png" alt="Segurança"></div><div id="relogio">00:00</div></div></div>
  <script>
    const ICONS=[
      {id:"blog_nostalgia",label:"BLOG NOSTALGIA",img:"/images/snes.png",link:"https://nostalgia.mooon.com.br",row:0,col:0,menu:"Links",clippy:"/images/clippy/reading.gif"},
      {id:"habbo",label:"Habbo Hotel",img:"/images/habbo%20hc.fw.png",link:"https://nostalgia.mooon.com.br/2025/12/habbo-hotel.html",row:0,col:1,clippy:"/images/clippy/reading.gif"},
      {id:"ps1",label:"Playstation 1",img:"/images/ps1.png",link:"https://nostalgia.mooon.com.br/search/label/PlayStation%201",row:0,col:2,clippy:"/images/clippy/reading.gif"},
      {id:"ps2",label:"Playstation 2",img:"/images/ps2.png",link:"https://nostalgia.mooon.com.br/search/label/PlayStation%202",row:0,col:3,clippy:"/images/clippy/reading.gif"},
      {id:"snes",label:"Super Nintendo",img:"/images/supern.png",link:"https://nostalgia.mooon.com.br/search/label/Super%20Nintendo",row:0,col:4,clippy:"/images/clippy/reading.gif"},
      {id:"instagram",label:"Instagram",img:"/images/insta.png",link:"https://instagram.com/mooon.br",row:1,col:0,menu:"Redes sociais"},
      {id:"tiktok",label:"Tiktok",img:"/images/tiktok.png",link:"https://tiktok.com/@mooon.br",row:1,col:1,menu:"Redes sociais"},
      {id:"twitch",label:"Twitch",img:"/images/twitch.png",link:"https://twitch.tv/mooonbr",row:1,col:2,menu:"Redes sociais"},
      {id:"youtube",label:"Youtube",img:"/images/youtube.png",link:"https://youtube.com/channel/UCst0jXP1CRb-_1S00F1NMgQ",row:1,col:3,menu:"Redes sociais"},
      {id:"playlists",label:"Playlists nostálgicas",img:"/images/ringtone.png",link:"/musicas.html",row:2,col:0,menu:"Links",clippy:"/images/clippy/music.gif"},
      {id:"musicas_ia",label:"Músicas geradas por IA",img:"/images/music_icon_trophy.png",link:"/aimusic.html",row:2,col:1,menu:"Links",clippy:"/images/clippy/music.gif"},
      {id:"moon_tv",label:"Moon TV",img:"/images/series.png",link:"/tv/index.html",row:2,col:2,menu:"Links"},
      {id:"pokemon",label:"Meus Pokémon",img:"/images/pokeshelf.png",link:"/pokemon.html",row:2,col:3,menu:"Links"}
    ];
    const FUN=["/images/clippy/fun/bicicle.gif","/images/clippy/fun/check.gif","/images/clippy/fun/coçando cabeça.gif","/images/clippy/fun/luneta.gif","/images/clippy/fun/melting down.gif","/images/clippy/fun/toc toc.gif","/images/clippy/fun/pretendtodie.gif","/images/clippy/fun/box.gif","/images/clippy/fun/atom.gif"];
    const STORE="moon:index:languageOverlay:v1", TRANS="https://www-mooon-com-br.translate.goog/?_x_tr_sch=http&_x_tr_sl=auto&_x_tr_tl=en&_x_tr_hl=en&_x_tr_pto=wapp";
    function mobile(){return matchMedia("(max-width:900px)").matches||matchMedia("(pointer:coarse)").matches}
    function render(){const desk=document.getElementById("desktopArea");desk.querySelectorAll(".desktop-icon").forEach(e=>e.remove());const m=mobile(),w=innerWidth,iconW=m?135:112,stepX=m?Math.max(iconW+4,(w-24)/(w<430?2:3)):120,stepY=m?150:155,marginX=m?12:26,marginY=m?16:40,cols=m?(w<430?2:3):null;ICONS.forEach((ic,i)=>{const el=document.createElement("div");el.className="desktop-icon";el.innerHTML=`<img src="${ic.img}" alt="${ic.label}"><span>${ic.label}</span>${ic.clippy?`<img class="clippy-label" src="${ic.clippy}" alt="Clippy">`:""}`;el.onclick=()=>window.open(ic.link,"_blank");const row=m?Math.floor(i/cols):ic.row,col=m?i%cols:ic.col;el.style.left=(m?marginX+col*stepX+(stepX-iconW)/2:marginX+col*stepX)+"px";el.style.top=(marginY+row*stepY)+"px";desk.appendChild(el)});const c=document.getElementById("clippy-fun");c.innerHTML=`<img src="${FUN[Math.floor(Math.random()*FUN.length)]}" alt="Clippy animado">`}
    function renderMenu(){document.querySelectorAll(".col").forEach(col=>{const title=col.querySelector(".tituloColuna").textContent;ICONS.filter(i=>i.menu===title).forEach(ic=>{const item=document.createElement("div");item.className="itemIniciar";item.innerHTML=`<img src="${ic.img}" alt="${ic.label}"><span><strong>${ic.label}</strong></span>`;item.onclick=()=>window.open(ic.link,"_blank");col.appendChild(item)})})}
    function clock(){const d=new Date();document.getElementById("relogio").textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
    function lang(){const p=new URLSearchParams(location.search),overlay=document.getElementById("moonLangOverlay"),lang=((navigator.languages&&navigator.languages[0])||navigator.language||"").toLowerCase();const handled=(()=>{try{return localStorage.getItem(STORE)}catch(e){return null}})();if(p.get("langPrompt")==="0")return;if(p.get("langPrompt")==="1"||(!handled&&lang&&!lang.startsWith("pt")))overlay.hidden=false;overlay.addEventListener("click",e=>{const b=e.target.closest("[data-lang-action]");if(!b)return;try{localStorage.setItem(STORE,b.dataset.langAction==="translate"?"translated":"dismissed")}catch(err){}if(b.dataset.langAction==="translate")location.href=TRANS;else overlay.hidden=true});addEventListener("keydown",e=>{if(e.key==="Escape")overlay.hidden=true})}
    document.addEventListener("DOMContentLoaded",()=>{render();renderMenu();clock();setInterval(clock,30000);lang();document.getElementById("iniciar").onclick=e=>{e.stopPropagation();document.getElementById("menuIniciar").classList.toggle("active");e.currentTarget.classList.toggle("active")};document.addEventListener("click",e=>{if(!document.getElementById("menuIniciar").contains(e.target)&&!document.getElementById("iniciar").contains(e.target)){document.getElementById("menuIniciar").classList.remove("active");document.getElementById("iniciar").classList.remove("active")}});addEventListener("resize",render,{passive:true})});
  </script>
</body>
</html>
