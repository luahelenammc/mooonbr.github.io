<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Portal da Moon — Language Overlay Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .moon-index-frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #000;
    }
    .moon-lang-overlay {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(2px);
    }
    .moon-lang-overlay[hidden] {
      display: none !important;
    }
    .moon-lang-modal {
      width: min(760px, 94vw);
      max-height: min(92vh, 760px);
      overflow-y: auto;
      padding: 24px 24px 26px;
      text-align: center;
      color: #fff;
      background: #1f1f1f;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.75);
    }
    .moon-lang-question {
      width: 86px;
      max-width: 28vw;
      height: auto;
      margin: 0 auto 8px;
      image-rendering: auto;
    }
    .moon-lang-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      font-weight: 600;
      opacity: 0.78;
    }
    .moon-lang-subtitle {
      max-width: 560px;
      margin: 10px auto 4px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      line-height: 1.45;
    }
    .moon-lang-options {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .moon-lang-option {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: min(260px, 76vw);
      min-height: 305px;
      padding: 14px 12px 16px;
      border: 0;
      border-radius: 10px;
      color: #fff;
      font: inherit;
      text-align: center;
      cursor: pointer;
      transition: background 0.35s, box-shadow 0.35s, transform 0.2s;
    }
    .moon-lang-option:hover,
    .moon-lang-option:focus-visible {
      transform: translateY(-1px);
      outline: 0;
    }
    .moon-lang-option.usa {
      background: rgba(255, 45, 45, 0.3);
    }
    .moon-lang-option.brazil {
      background: rgba(47, 179, 57, 0.3);
    }
    .moon-lang-option.usa:hover,
    .moon-lang-option.usa:focus-visible {
      background: rgb(255, 45, 45);
      box-shadow: 0 0 0 3px rgb(255, 45, 45);
    }
    .moon-lang-option.brazil:hover,
    .moon-lang-option.brazil:focus-visible {
      background: rgb(47, 179, 57);
      box-shadow: 0 0 0 3px rgb(47, 179, 57);
    }
    .moon-lang-option img {
      width: 100%;
      max-width: 230px;
      height: auto;
      margin-bottom: 6px;
      pointer-events: none;
    }
    .moon-lang-option.brazil img {
      max-width: 245px;
    }
    .moon-lang-idioma {
      margin: 4px 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 21px;
      font-weight: 700;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
    }
    .moon-lang-descricao {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;
      font-style: italic;
      line-height: 1.35;
    }
    .moon-lang-muted {
      opacity: 0.5;
    }
    .moon-lang-close {
      margin-top: 14px;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }
    .moon-lang-close:hover,
    .moon-lang-close:focus-visible {
      background: rgba(255, 255, 255, 0.16);
      outline: 0;
    }
    @media (max-width: 640px) {
      .moon-lang-overlay {
        align-items: flex-start;
        padding: 14px;
      }
      .moon-lang-modal {
        padding: 18px 14px 20px;
      }
      .moon-lang-options {
        gap: 14px;
      }
      .moon-lang-option {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <iframe class="moon-index-frame" src="/index.html" title="Portal da Moon"></iframe>

  <div id="moonLangOverlay" class="moon-lang-overlay" role="dialog" aria-modal="true" aria-labelledby="moonLangTitle" hidden>
    <div class="moon-lang-modal">
      <img class="moon-lang-question" src="/images/smbox.png" alt="" aria-hidden="true">
      <h2 id="moonLangTitle" class="moon-lang-title">Language <span class="moon-lang-muted">/</span> Idioma</h2>
      <p class="moon-lang-subtitle">This website is originally written in Brazilian Portuguese. You can keep the original version or open an automatic Google translation.</p>
      <div class="moon-lang-options">
        <button type="button" class="moon-lang-option usa" data-lang-action="translate">
          <img src="/images/usa.png" alt="English">
          <span class="moon-lang-idioma">English</span>
          <span class="moon-lang-descricao">Translated by Google.<br><span class="moon-lang-muted">Might not be 100% accurate.</span></span>
        </button>
        <button type="button" class="moon-lang-option brazil" data-lang-action="dismiss">
          <img src="/images/brazil.png" alt="Português Brasileiro">
          <span class="moon-lang-idioma">Português Brasileiro</span>
          <span class="moon-lang-descricao">Idioma original</span>
        </button>
      </div>
      <button type="button" class="moon-lang-close" data-lang-action="dismiss">Keep original / Manter original</button>
    </div>
  </div>

  <script>
    const MOON_LANGUAGE_OVERLAY_STORAGE_KEY = "moon:index2:languageOverlayPreview:v1";
    const MOON_TRANSLATED_HOME_URL = "https://www-mooon-com-br.translate.goog/?_x_tr_sch=http&_x_tr_sl=auto&_x_tr_tl=en&_x_tr_hl=en&_x_tr_pto=wapp";

    function getPrimaryBrowserLanguage() {
      const list = Array.isArray(navigator.languages) && navigator.languages.length
        ? navigator.languages
        : [navigator.language || navigator.userLanguage || ""];
      return String(list[0] || "").toLowerCase();
    }

    function getLanguageOverlayState() {
      try { return localStorage.getItem(MOON_LANGUAGE_OVERLAY_STORAGE_KEY); }
      catch (err) { return null; }
    }

    function setLanguageOverlayState(value) {
      try { localStorage.setItem(MOON_LANGUAGE_OVERLAY_STORAGE_KEY, value); }
      catch (err) {}
    }

    function shouldShowLanguageOverlay() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("langPrompt") === "1") return true;
      if (params.get("langPrompt") === "0") return false;

      const primaryLang = getPrimaryBrowserLanguage();
      const alreadyHandled = getLanguageOverlayState();
      return !alreadyHandled && primaryLang && !primaryLang.startsWith("pt");
    }

    function dismissLanguageOverlay(reason = "dismissed") {
      const overlay = document.getElementById("moonLangOverlay");
      if (!overlay) return;
      setLanguageOverlayState(reason);
      overlay.hidden = true;
    }

    function maybeShowLanguageOverlay() {
      const overlay = document.getElementById("moonLangOverlay");
      if (!overlay || !shouldShowLanguageOverlay()) return;

      overlay.hidden = false;
      overlay.addEventListener("click", ev => {
        const actionButton = ev.target.closest("[data-lang-action]");
        if (!actionButton) return;

        const action = actionButton.dataset.langAction;
        if (action === "translate") {
          setLanguageOverlayState("translated");
          window.location.href = MOON_TRANSLATED_HOME_URL;
          return;
        }

        dismissLanguageOverlay("dismissed");
      });

      document.addEventListener("keydown", ev => {
        if (ev.key === "Escape" && !overlay.hidden) dismissLanguageOverlay("dismissed");
      });
    }

    document.addEventListener("DOMContentLoaded", maybeShowLanguageOverlay);
  </script>
</body>
</html>
